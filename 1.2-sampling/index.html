    <h1>標本分布の相互関係 ($t, \chi^2, F$)</h1>
    <p>💡 **このモジュールで学ぶこと**

「10人の血圧データだけで新薬の効果を証明できるか？」——この問いに答えるには、正規分布だけでは不十分です。なぜなら、真のばらつき（母分散）が分からないからです。このモジュールでは、その制約のもとで正確な推測を可能にする3つの分布 $t$・$\chi^2$・$F$ の意味と使い所を学びます。

💡 **「代用品を使う不確かさ」を正直に反映した分布**

理想の統計では「真のばらつき $\sigma^2$（母分散）が既知」という前提で正規分布を使います。しかし現実に母分散が分かっていることはまずありません。

仕方なく「手元のデータから計算した $s^2$（標本分散）」で代用するしかないのですが——これは「精密な計量カップの代わりに目分量で塩を入れる」ようなものです。代用品を使う分の余分な不確かさを、形に正直に反映したのが、これから学ぶ3つの分布です。

---

### 1. $t$ 分布：母分散が不明なときの推測

新薬を10人に投与したら血圧が平均 **5 mmHg** 下がった。「これは本物の効果か、偶然か？」を調べたいが、全人類の血圧...</p>
