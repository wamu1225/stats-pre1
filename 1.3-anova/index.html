    <h1>分散分析 (ANOVA)</h1>
    <p>💡 **このモジュールで学ぶこと**

「3つ以上のグループに差があるか」を調べるのに、t検定を何度も繰り返してはいけません——繰り返すほど「たまたまの差」を本物と誤認するリスクが膨らむからです。このモジュールでは、その問題を1回の検定で解決する**分散分析（ANOVA）**の仕組みと、差が見つかった後の「どこが違うか」を特定する方法を学びます。

💡 **「何度もくじを引くほど外れが増える」問題**

コインを1回投げて「表が出たら差あり」と判定するとき、間違える確率は 5% です。では **3ペアを3回検定**するとどうなるでしょう？

P(\text{1回以上間違える}) = 1 - (1-0.05)^3 \approx 14\%

計算の読み方：「3回すべて正しく判断できる確率」は $(0.95)^3 \approx 86\%$ なので、「少なくとも1回は間違える確率」は $100\% - 86\% = 14\%$ になります。

有意水準を5%にしたつもりが、実際には14%で間違えてしまいます。分散分析は「3グループを1回の検定でまとめて比較」することでこの問題を回避しま...</p>
