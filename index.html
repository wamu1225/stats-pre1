    <script>
      // Apply theme before React mounts to prevent flash of wrong theme
      (function () {
        try {
          var t = localStorage.getItem('stats-pre1-theme');
          if (t !== 'dark' && t !== 'light') {
            t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.setAttribute('data-theme', t);
        } catch (e) { /* noop */ }
      })();
    </script>
    <script>
      // Restore URL after GitHub Pages 404 redirect (?/path/ → /stats-pre1/path/)
      (function () {
        var s = window.location.search;
        if (s[1] === '/') {
          var decoded = s.slice(1).split('&').map(function (p) { return p.replace(/~and~/g, '&'); });
          window.history.replaceState(
            null, null,
            '/stats-pre1' + decoded[0] +
            (decoded.slice(1).length ? '?' + decoded.slice(1).join('&') : '') +
            window.location.hash
          );
        }
      })();
